  <meta name="description" content="In this tutorial, we'll build a lightweight async page transition system from scratch using vanilla JavaScript, GSAP, and Vite."/>

  <link rel="shortcut icon" href="https://tympanus.net/favicon/favicon.ico" />

  <link rel="stylesheet" href="./sass/loader.scss">
</head>

<body>
  <!-- カーソル -->

  <!-- ローディング -->

  <!-- preloader -->
    <div class="l-loader p-loader" id="js-loader">
      <div class="p-loader__row">
        <p class="p-loader__text">
          <span class="line">Initiating</span>
        </p>
      </div>
      <div class="p-loader__row">
        <div class="p-loader__col">
          <div class="p-sub-col">
            <p class="p-loader__text">
              <span class="line">Phase 01</span>
            </p>
            <p class="p-loader__text">
              <span class="line">Sequence</span>
            </p>
            <p></p>
          </div>
          <div class="p-sub-col">
            <p class="p-loader__text">
              <span class="line">Signal Scan</span>
            </p>
            <p class="p-loader__text">
              <span class="line">07 Layers</span>
            </p>
          </div>
        </div>
        <div class="p-loader__col">
          <p class="p-loader__text">
            <span class="line">PX-17</span>
          </p>
        </div>
      </div>

      <div class="p-loader__btn p-loader-btn" id="js-loader-btn">
        <img class="p-loader-btn__logo" id="js-loader-logo" src="/images/youtube.png" alt="">
        <p class="p-loader-btn__start" id="js-loader-start">
          <span class="line">start</span>
        </p>
        <p class="p-loader-btn__end" id="js-loader-end">
          <span class="line">Access Granted</span>
        </p>

        <!-- カウントアップ -->
        <div class="p-loader-btn__coutup c-countup" id="js-countup">
          <div class="c-countup__inner" id="js-countup-inner"></div>
        </div>

        <!-- SVGアニメーション -->
        <div class="p-loader-btn__svg-strokes p-svg-strokes">
          <!-- <svg
            xmlns="http://www.w3.org/2000/svg"
            class="mouse-viewport"
            style="background-color: lightgray;"
            width="400"
            height="400"
            viewBox="0 0 200 400"
            preserveAspectRatio="xMidYMid slice"
          > -->
          <!-- ⭐️TODO width heightなどの設定 -->
          <svg
            class="p-svg-strokes__svg"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 320 320"
            fill="none" 
            preserveAspectRatio="xMidYMid meet"
          >
            <!-- 
              stroke 線の色
              stroke-width 線の太さ
              stroke-dasharray 点線にする設定
                              今回は円の全周の長さ
              → なぜ974？ → 2πrは円周の長さ 
                            2 * π * 155 = 974
              ・stroke-dasharray 10だと、10の線 10の空白 10の線 ... のくらい返し
              ・stroke-dashoffset 線の表示開始位置。プラスで右にずれる
              👉 ここでは、演習分の長さが右にずれてみえないようになっている　

              ✅ circleのラインの特徴
              → 右(3時)から時計回りに引かれる
            -->
            <!-- グレーのcircle  -->
            <circle 
              class="p-svg-strokes__track c-svg-track"
              id="js-svg-track" 
              cx="160" 
              cy="160" 
              r="155" 
              stroke="#2b2b2b" 
              stroke-width="1" 
              stroke-dasharray="974" 
              stroke-dashoffset="974"
            /> 

            <!-- 白circle -->
            <circle 
              class="p-svg-strokes c-svg-progress"
              id="js-svg-progress"
              cx="160" 
              cy="160" 
              r="155" 
              stroke="#fff" 
              stroke-width="1" 
              stroke-dasharray="974" 
              stroke-dashoffset="974" 
              data-mouse="stuck"
              data-mouse-scale="1"
            /> 
          </svg>
        </div>
      </div>
    </div>
    <!-- preloader -->


  <div class="l-global-container p-global-container" id="js-global-container">
    <!-- 
      カスタムHTMLタグ
      Web Components
    -->
    <c-header></c-header>

    <!-- 
      wrapperの中のcontainerを差し替えることでSPAを実現
      containerの中にcurrentContainerとnextContainerの2つを入れて、
      アニメーションを実現している
    -->
    <div 
      id="js-container-wrapper" 
      data-transition="container-wrapper"
    >
      <!-- currentContainer -->
      <div data-transition="container" data-namespace="home">
        <main class="l-main p-main" id="js-main">
        </main>
      </div>

      <!-- ✅ nextContainerを差し込む → currentContainerを消す -->
    </div>
  
    <!-- Footer -->

    <canvas class="c-canvas" id="js-canvas"></canvas>

    <!-- カーソル JSから挿入 -->
    <!--

        </g>
      </svg> 
    -->
  </div>

  <!-- 
    vite.config.jsでsrcが/となっているので
  -->
  <script type="module" src="/index.js"></script>
</body>
</html>
