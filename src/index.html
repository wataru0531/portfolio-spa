        <div class="p-preloader-btn__svg-strokes">
          <!-- <svg
            xmlns="http://www.w3.org/2000/svg"

            width="400"
            height="400"
            viewBox="0 0 200 400"

          > -->
          <!-- ⭐️TODO width heightなどの設定 -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 320 320"
            fill="none" 
            preserveAspectRatio="xMidYMid meet"
          >
            <!-- 
              stroke 線の色
              stroke-width 線の太さ
              stroke-dasharray 点線にする設定
                              今回は円の全周の長さ
              → なぜ974？ → 2πrは円周の長さ 
                            2 * π * 155 = 974
              ・stroke-dasharray 10だと、10の線 10の空白 10の線 ... のくらい返し
              ・stroke-dashoffset 線の表示開始位置。プラスで右にずれる
              👉 ここでは、演習分の長さが右にずれてみえないようになっている　

              ✅ circleのラインの特徴
              → 右(3時)から時計回りに引かれる
            -->
            <!-- グレーのcircle  -->
            <circle 
              class="stroke-track" 
              cx="160" 
              cy="160" 
              r="155" 
              stroke="#2b2b2b" 
              stroke-width="5" 
              stroke-dasharray="974" 
              stroke-dashoffset="974" 
            /> 

            <!-- 白circle -->
            <circle 
              class="stroke-progress"
              cx="160" 
              cy="160" 
              r="155" 
              stroke="#fff" 
              stroke-width="5" 
              stroke-dasharray="974" 
              stroke-dashoffset="974" 
            /> 
          </svg>
        </div>
      </div>
    </div>
    <!-- preloader -->


  <div className="l-global-container" id="js-global-container">
    <!-- 
      カスタムHTMLタグ
      Web Components
    -->
    <c-header></c-header>

    <!-- 
      wrapperの中のcontainerを差し替えることでSPAを実現
      containerの中にcurrentContainerとnextContainerの2つを入れて、
      アニメーションを実現している
    -->
    <div 
      id="js-container-wrapper" 
      data-transition="container-wrapper"
    >
      <!-- currentContainer -->
      <div data-transition="container" data-namespace="home">
        <main class="l-main p-main" id="js-main">
        </main>
      </div>

      <!-- ✅ nextContainerを差し込む → currentContainerを消す -->
    </div>
  
    <!-- Footer -->

    <canvas class="c-canvas" id="js-canvas"></canvas>
