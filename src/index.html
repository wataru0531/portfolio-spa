<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asynchronous Page Transitions</title>
  <meta name="description" content="In this tutorial, we'll build a lightweight async page transition system from scratch using vanilla JavaScript, GSAP, and Vite."/>
  <link rel="icon" type="image/svg+xml" href="https://tympanus.net/favicon/favicon.svg" />
  <link rel="shortcut icon" href="https://tympanus.net/favicon/favicon.ico" />
</head>

<body>
  <!-- カーソル -->

  <!-- ローディング -->
  <div class="l-loader p-loader" id="js-loader">
    <div class="p-loader__inner">
      <div class="p-loader__rect">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="p-loader__percent" id="js-loader-percent"></div>
    </div>
  </div>

  <div className="l-global-container" id="js-global-container">
    <!-- 
      カスタムHTMLタグ
      Web Components
    -->
    <c-header></c-header>

    <!-- 
      wrapperの中のcontainerを差し替えることでSPAを実現
      containerの中にcurrentContainerとnextContainerの2つを入れて、
      アニメーションを実現している
    -->
    <div 
      id="js-container-wrapper" 
      data-transition="container-wrapper"
    >
      <!-- currentContainer -->
      <div data-transition="container" data-namespace="home">
        <main class="l-main p-main" id="js-main">
        </main>
      </div>

      <!-- nextContainerを差し込む → currentContainerを消す -->
    </div>
  
    <!-- Footer -->

    <canvas class="c-canvas" id="js-canvas"></canvas>

    <!-- カーソル JSから挿入 -->
    <!--

        </g>
      </svg> 
    -->
  </div>

  <!-- 
    vite.config.jsでsrcが/となっているので
  -->
  <script type="module" src="/index.js"></script>
</body>
</html>
